version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: claimappealpro-db-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: claimappealpro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: claimappealpro-redis-local
    ports:
      - "6379:6379"

volumes:
  pgdata:
